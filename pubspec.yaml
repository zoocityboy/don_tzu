name: art_of_deal_war
description: "The Art of War - Deal Edition: A parody app with satirical quotes"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7
  flutter: ^3.38.0

dependencies:
  audioplayers: ^6.4.0
  cupertino_icons: ^1.0.8
  drift: ^2.26.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.0
  flutter_localizations:
    sdk: flutter
  get_it: ^8.0.3
  go_router: ^15.1.0
  google_fonts: ^6.2.1
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  http: ^1.2.0
  intl: ^0.20.2
  logging: ^1.2.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  shared_preferences: ^2.3.5
  sqlite3_flutter_libs: ^0.5.31

dev_dependencies:
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.10.0
  flutter_test:
    sdk: flutter
  hive_ce_generator: ^1.7.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/backgrounds/
    - assets/sound/
    - assets/tts/
    - assets/quotes/

# Configuration for flutter_launcher_icons
flutter_icons:
  android:
    generate: true
  ios:
    generate: true
  macos:
    generate: true
  windows:
    generate: true
  linux:
    generate: true
  web:
    generate: true
  image_path: assets/app_icon.png
