name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Create release with release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: dart
          config-file: release-please-config.json
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-github-pull-request: true
          target-branch: main

      - name: Sync repository after release-please
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Build Android release APK
        run: flutter build apk --release

      - name: Build Web release
        run: flutter build web --release

      - name: Upload Android release artifact
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} build/app/outputs/flutter-apk/app-release.apk
